services:
  - type: web
    name: medbook-backend-server
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && python scripts/seed_data.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medbook-db-data
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"

databases:
  - name: medbook-db-data
    databaseName: medbook_db
    plan: free
    region: oregon # Thường vùng US (Oregon/Ohio) có database free sẵn sàng hơn Singapore
